<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandeep ❤️ Shivani</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    color:white;
    text-align:center;
    background: radial-gradient(circle at bottom,#020111 0%,#000000 80%);
    overflow:hidden;
}

/* Star background */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:transparent;
}

.stars span{
    position:absolute;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* Main container */

.container{
    position:relative;
    z-index:10;
    padding-top:40px;
}

/* Title */

h1{
    font-size:45px;
    margin-bottom:5px;
}

/* Subtitle */

.tagline{
    font-size:24px;
    color:#ff9ecb;
}

/* Couple photo */

.photo{
    width:260px;
    height:260px;
    border-radius:50%;
    margin:30px auto;
    overflow:hidden;
    border:5px solid #ff6fa5;
    box-shadow:0 0 25px #ff6fa5;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Heartbeat */

.heart{
    font-size:50px;
    animation: heartbeat 1s infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.2);}
    40%{transform:scale(1);}
    60%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* Countdown */

#timer{
    font-size:35px;
    margin-top:20px;
    font-weight:bold;
}

/* Mobile */

@media (max-width:600px){

h1{
font-size:32px;
}

.tagline{
font-size:18px;
}

#timer{
font-size:26px;
}

.photo{
width:200px;
height:200px;
}

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h1>Sandeep ❤️ Shivani</h1>

<div class="tagline">❤️ Countdown to forever ❤️</div>

<div class="photo">
<img src="photo.jpg" alt="Our Photo">
</div>

<div class="heart">❤️</div>

<div id="timer"></div>

</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* Countdown */

var targetDate = new Date("October 10, 2026 00:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = targetDate - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("timer").innerHTML =
days+" Days "+hours+" Hours "+minutes+" Minutes "+seconds+" Seconds";

},1000);


/* Generate stars */

const starContainer = document.getElementById("stars");

for(let i=0;i<120;i++){

let star=document.createElement("span");

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDuration=(1+Math.random()*3)+"s";

starContainer.appendChild(star);

}

</script>

</body>
</html>
